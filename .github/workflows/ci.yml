name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ═══════════════════════════════════════════════════════════
  # Stage 1: 代码质量检查
  # ═══════════════════════════════════════════════════════════
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript 类型检查
        run: pnpm run type-check

      - name: 安全漏洞审计
        run: pnpm audit --audit-level=high

      - name: 单元测试 + 覆盖率
        run: pnpm test -- --coverage

      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # Stage 2: 构建 & CRX 打包
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: quality
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 提取版本号
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: 构建生产包
        run: pnpm build

      - name: 打包 CRX
        run: node scripts/pack-crx.js
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}

      - name: 上传构建产物 (unpacked zip)
        uses: actions/upload-artifact@v4
        with:
          name: x-pocket-v${{ steps.version.outputs.version }}-unpacked
          path: dist/
          retention-days: 30

      - name: 上传 CRX 文件
        uses: actions/upload-artifact@v4
        with:
          name: x-pocket-v${{ steps.version.outputs.version }}-crx
          path: x-pocket-v${{ steps.version.outputs.version }}.crx
          retention-days: 30

      - name: 生成构建摘要
        if: always()
        run: |
          echo "## X-Pocket Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════
  # Stage 3: GitHub Release（仅 tag 推送）
  # ═══════════════════════════════════════════════════════════
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5

    steps:
      - name: 获取版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: 下载 CRX 产物
        uses: actions/download-artifact@v4
        with:
          name: x-pocket-v${{ steps.version.outputs.version }}-crx

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: X-Pocket v${{ steps.version.outputs.version }}
          body: |
            ## X-Pocket v${{ steps.version.outputs.version }}

            构建自提交: `${{ github.sha }}`

            ### 安装方法
            1. 下载 `.crx` 文件
            2. 打开 `chrome://extensions`，开启「开发者模式」
            3. 将 `.crx` 文件拖入页面即可安装

            > 如果拖入安装失败，请解压 `unpacked.zip`，使用「加载已解压的扩展程序」安装。
          files: |
            *.crx
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  # ═══════════════════════════════════════════════════════════
  # Stage 4: 失败通知（仅 main 分支）
  # ═══════════════════════════════════════════════════════════
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: |
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    timeout-minutes: 3

    steps:
      - name: 输出失败摘要
        run: |
          echo "## ❌ CI/CD Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow URL | [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请检查 [Actions 日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 了解详情。" >> $GITHUB_STEP_SUMMARY
